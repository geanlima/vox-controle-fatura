services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vox_finance
      POSTGRES_USER: vox
      POSTGRES_PASSWORD: voxpass
    ports:
      - "5433:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vox -d vox_finance"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql+psycopg://vox:voxpass@postgres:5432/vox_finance
      API_PORT: "8080"
      API_CORS_ORIGINS: "http://localhost:4200,http://localhost:3000"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pg_data:

