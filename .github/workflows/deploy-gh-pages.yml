name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build (GitHub Pages)
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          npm run build -- --base-href "/${REPO_NAME}/"

      - name: Detect output directory
        run: |
          if [ -d "dist/vox-controle-fatura/browser" ]; then
            echo "PAGES_PATH=dist/vox-controle-fatura/browser" >> "$GITHUB_ENV"
          else
            echo "PAGES_PATH=dist/vox-controle-fatura" >> "$GITHUB_ENV"
          fi

      - name: SPA fallback (404.html)
        run: |
          # Angular SSR/prerender pode não gerar /browser/index.html, apenas /browser/<rota>/index.html.
          # Para GitHub Pages (SPA), garantimos um index.html na raiz do artefato.
          if [ ! -f "${PAGES_PATH}/index.html" ] && [ -d "${PAGES_PATH}" ]; then
            FIRST_INDEX="$(find "${PAGES_PATH}" -maxdepth 2 -type f -name index.html | head -n 1)"
            if [ -n "${FIRST_INDEX}" ]; then
              cp "${FIRST_INDEX}" "${PAGES_PATH}/index.html"
            fi
          fi

          cp "${PAGES_PATH}/index.html" "${PAGES_PATH}/404.html"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.PAGES_PATH }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

