name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build (GitHub Pages)
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          npm run build -- --base-href "/${REPO_NAME}/"

      - name: SPA fallback (404.html)
        run: |
          cp "dist/vox-controle-fatura/browser/index.html" "dist/vox-controle-fatura/browser/404.html"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/vox-controle-fatura/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

