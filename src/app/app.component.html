<mat-sidenav-container class="app-shell">
  <mat-sidenav
    #sidenav
    class="rail"
    [mode]="isDesktop() ? 'side' : 'over'"
    [opened]="isDesktop()"
    [autoFocus]="false">
    <div class="side-top">
      <div class="logo">
        <div class="logo-badge">V</div>
        <div class="logo-text">
          <div class="logo-title">vox</div>
          <div class="logo-sub">controle fatura</div>
        </div>
      </div>

      <div class="profile">
        <div class="avatar">G</div>
        <div class="who">
          <div class="name">Gean</div>
          <div class="email">offline&#64;local</div>
        </div>
      </div>
    </div>

    <div class="side-nav">
      <div class="nav-title">Menu</div>

      <div class="nav-group">
        <button type="button" class="nav-group-title tree-header" (click)="toggleGrupo('cadastro')">
          <span>Cadastro</span>
          <span class="tree-toggle">{{ cadastroAberto() ? '−' : '+' }}</span>
        </button>
        <div *ngIf="cadastroAberto()">
          <a mat-list-item routerLink="/cartoes" routerLinkActive="active" (click)="!isDesktop() && sidenav.close()" class="nav-item nav-subitem">
            <span matListItemTitle>Cartão de crédito</span>
          </a>
          <a mat-list-item routerLink="/layouts" routerLinkActive="active" (click)="!isDesktop() && sidenav.close()" class="nav-item nav-subitem">
            <span matListItemTitle>Layout</span>
          </a>
        </div>
      </div>

      <div class="nav-sep"></div>

      <div class="nav-group">
        <button type="button" class="nav-group-title tree-header" (click)="toggleGrupo('fatura')">
          <span>Fatura</span>
          <span class="tree-toggle">{{ faturaAberto() ? '−' : '+' }}</span>
        </button>
        <div *ngIf="faturaAberto()">
          <a mat-list-item routerLink="/importar" routerLinkActive="active" (click)="!isDesktop() && sidenav.close()" class="nav-item nav-subitem">
            <span matListItemTitle>Importar</span>
          </a>
          <a mat-list-item routerLink="/dashboard" routerLinkActive="active" (click)="!isDesktop() && sidenav.close()" class="nav-item nav-subitem">
            <span matListItemTitle>Dashboard</span>
          </a>
          <a mat-list-item routerLink="/faturas" routerLinkActive="active" (click)="!isDesktop() && sidenav.close()" class="nav-item nav-subitem">
            <span matListItemTitle>Faturas salvas</span>
          </a>
        </div>
      </div>

      <div class="nav-sep"></div>

      <div class="nav-group">
        <button type="button" class="nav-group-title tree-header" (click)="toggleGrupo('movimento')">
          <span>Movimento</span>
          <span class="tree-toggle">{{ movimentoAberto() ? '−' : '+' }}</span>
        </button>
        <div *ngIf="movimentoAberto()">
          <a mat-list-item routerLink="/lancamento-manual" routerLinkActive="active" (click)="!isDesktop() && sidenav.close()" class="nav-item nav-subitem">
            <span matListItemTitle>Lançamento manual</span>
          </a>
        </div>
      </div>

      <div class="nav-sep"></div>

      <div class="nav-group">
        <button type="button" class="nav-group-title tree-header" (click)="toggleGrupo('configuracoes')">
          <span>Configurações</span>
          <span class="tree-toggle">{{ configuracoesAberto() ? '−' : '+' }}</span>
        </button>
        <div *ngIf="configuracoesAberto()">
          <a
            mat-list-item
            routerLink="/configuracoes/parametros"
            routerLinkActive="active"
            (click)="!isDesktop() && sidenav.close()"
            class="nav-item nav-subitem">
            <span matListItemTitle>Parâmetro</span>
          </a>
        </div>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="topbar" color="primary">
      <button
        mat-icon-button
        type="button"
        (click)="sidenav.toggle()"
        aria-label="Menu"
        class="only-mobile">
        <mat-icon>menu</mat-icon>
      </button>

      <mat-form-field appearance="outline" class="search">
        <mat-icon matPrefix>search</mat-icon>
        <input
          matInput
          [value]="search()"
          (input)="search.set($any($event.target).value)"
          placeholder="Search transaction..." />
      </mat-form-field>

      <span style="flex: 1 1 auto;"></span>

      <button mat-icon-button type="button" aria-label="Notifications">
        <mat-icon>notifications</mat-icon>
      </button>
      <button mat-raised-button color="primary" type="button" class="top-action">
        Gerar relatório
      </button>
    </mat-toolbar>

    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
